name: cloudflare-python-workers CI

on:
  push:
    branches: [main]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

defaults:
  run:
    working-directory: cloudflare-python-workers

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install flake8

      - name: Lint all workers
        run: |
          flake8 workers/api-worker/main.py     --max-line-length=100
          flake8 workers/task-producer/main.py  --max-line-length=100
          flake8 workers/task-consumer/main.py  --max-line-length=100

  validate:
    name: Validate wrangler configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler
        working-directory: .

      - name: Validate configs (dry run)
        run: |
          cd workers/api-worker     && wrangler deploy --dry-run
          cd workers/task-producer  && wrangler deploy --dry-run
          cd workers/task-consumer  && wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [lint, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler
        working-directory: .

      - name: Deploy → staging
        run: |
          cd workers/api-worker     && wrangler deploy --env staging
          cd workers/task-producer  && wrangler deploy --env staging
          cd workers/task-consumer  && wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-production:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [lint, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler
        working-directory: .

      - name: Deploy → production
        run: |
          cd workers/api-worker     && wrangler deploy --env production
          cd workers/task-producer  && wrangler deploy --env production
          cd workers/task-consumer  && wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
